<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>การ์ดเชิญงานหมั้น</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Petal Container (fullscreen behind everything) -->
    <div class="petals-container" id="petalsContainer"></div>

    <div class="container">
        <div class="card-wrapper">

            <!-- 3D Card Container with Doors -->
            <div class="card-3d-container" id="card3d">
                <!-- Left Door -->
                <div class="door door-left">
                    <img src="images/1.png" alt="Left Door" class="door-image">
                </div>

                <!-- Right Door -->
                <div class="door door-right">
                    <img src="images/2.png" alt="Right Door" class="door-image">
                </div>

                <!-- Flip Card (shown after doors open) -->
                <div class="flip-card" id="flipCard">
                    <div class="flip-card-inner" id="flipCardInner">
                        <!-- Front: 3.png -->
                        <div class="flip-card-front">
                            <img src="images/3.png" alt="Front Card" class="card-image">
                            <!-- Sparkles -->
                            <div class="sparkles" id="sparklesFront"></div>
                        </div>
                        <!-- Back: 4.png -->
                        <div class="flip-card-back">
                            <img src="images/4.png" alt="Back Card" class="card-image">
                            <!-- Sparkles -->
                            <div class="sparkles" id="sparklesBack"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Hint shown after doors open -->
            <div class="flip-hint" id="flipHint">
                <span class="hint-icon">👆</span>
                <span class="hint-text">แตะเพื่อดูรายละเอียด</span>
            </div>

            <!-- Hint when viewing back -->
            <div class="flip-hint flip-hint-back" id="flipHintBack">
                <span class="hint-icon">👆</span>
                <span class="hint-text">แตะเพื่อกลับด้านการ์ด</span>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
