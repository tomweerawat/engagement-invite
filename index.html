<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>การ์ดเชิญงานหมั้น</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card-wrapper">
            <!-- Background (Front Cover) -->
            <div class="card-background">
                <img src="images/3.png" alt="Front Cover" class="card-image">
            </div>

            <!-- 3D Card Container with Doors -->
            <div class="card-3d-container">
                <!-- Left Door -->
                <div class="door door-left">
                    <img src="images/1.png" alt="Left Door" class="door-image">
                </div>

                <!-- Right Door -->
                <div class="door door-right">
                    <img src="images/2.png" alt="Right Door" class="door-image">
                </div>

                <!-- Inside Card (Hidden initially, shown after doors open) -->
                <div class="card-inside">
                    <img src="images/4.png" alt="Inside Card" class="card-image">
                </div>
            </div>

            <!-- Tap Prompt -->
            <div class="tap-prompt">
                <p>Click or Tap to Open</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
